version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: easybuy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: easybuy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: easybuy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  easybuy-app:
    image: openjdk:17-jdk-slim
    container_name: easybuy-app
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/easybuy
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"

volumes:
  postgres-data: