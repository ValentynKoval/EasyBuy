# Docker profile
spring.datasource.url=jdbc:postgresql://postgres:5432/easybuy
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms

# Disable Vault in containerized local setup (no Vault service/token in compose)
spring.cloud.vault.enabled=false

# Stripe configuration for Docker runtime
stripe.api.key=${STRIPE_API_KEY:REDACTED}
stripe.onboarding.return-url=${STRIPE_ONBOARDING_RETURN_URL:http://localhost:8081/billing/return}
stripe.onboarding.refresh-url=${STRIPE_ONBOARDING_REFRESH_URL:http://localhost:8081/billing/refresh}

