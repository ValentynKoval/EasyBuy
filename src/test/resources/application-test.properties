# H2 for isolated tests
spring.datasource.url=jdbc:h2:mem:easybuy-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop

spring.cache.type=simple
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.cloud.vault.enabled=false
management.health.redis.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# Test-only stubs to avoid dependency on machine-level CLOUD_* env vars
cloudinary.cloud-name=test-cloud
cloudinary.api-key=test-key
cloudinary.api-secret=test-secret

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

stripe.api.key=test_key
stripe.onboarding.return-url=http://localhost/test-return
stripe.onboarding.refresh-url=http://localhost/test-refresh

